<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/Homepage.css" />
    <link rel="stylesheet" href="css/animations.css" />
    <link rel="stylesheet" href="css/glowing-effect.css" />
    <link rel="stylesheet" href="css/about-contact.css" />

    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="25.675"
      height="22.236"
      viewBox="0 0 25.675 22.236"
    >
      <symbol id="line">
        <path
          fill="none"
          stroke="#CF4981"

          stroke-miterlimit="10"
          d="M4.92 2.514L21.964 19.56"
        ></path>
      </symbol>
    </svg>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="29.093"
      height="14.546"
      viewBox="0 0 29.093 14.546"
    >
      <symbol id="semiCircle">
        <path
          fill="none"
          stroke="#CF4981"
          stroke-width="3"
          stroke-miterlimit="10"
          d="M1.5 14.546C1.5 7.34 7.34 1.5 14.547 1.5c7.205 0 13.046 5.84 13.046 13.046"
        ></path>
      </symbol>
    </svg>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="17.046"
      height="36.016"
      viewBox="0 0 17.046 36.016"
    >
      <symbol id="spring">
        <path
          fill="none"
          stroke="#CF4981"
          stroke-width="3"
          stroke-miterlimit="10"
          d="M9.945 34.614S1.46 31.38 1.5 23.92s11.73-4.797 11.73-4.797S3.82 16.708 4.18 8.77s12.784-7.255 12.784-7.255"
        ></path>
      </symbol>
    </svg>
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width="37.196"
      height="32.213"
      viewBox="0 0 37.196 32.213"
    >
      <symbol id="triangle">
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="25.675"
          height="22.236"
          viewBox="0 0 25.675 22.236"
        >
          <path
            fill="none"
            stroke="#CF4981"
            stroke-width="3"
            stroke-miterlimit="10"
            d="M12.837 3l5.12 8.868 5.12 8.868H2.597l5.12-8.868z"
          ></path>
        </svg>
      </symbol>
    </svg>
    <title>Contact - Dang The Developer</title>
  </head>

  <body>
    <!-- Floating background icons -->
    <div class="contact-page">
      <div class="background-icon">
        <svg
          width="25px"
          height="25px"
          class="layer1 p1"
          style="transform: matrix(-1, 0, 0, -1, 200, 203.0769)"
        >
          <use xlink:href="#triangle" class="yellow"></use>
        </svg>
        <svg
          width="25px"
          height="25px"
          class="layer1 p1"
          style="transform: matrix(-1, 0, 0, -1, 18, 500.7692)"
        >
          <use xlink:href="#triangle" class="yellow"></use>
        </svg>
        <svg
          width="28px"
          height="28px"
          class="layer1 p2"
          style="transform: matrix(1, 0, 0, 1, 405.3846, 208.7692)"
        >
          <use xlink:href="#semiCircle" class="yellow"></use>
        </svg>
        <svg
          width="25px"
          height="25px"
          class="layer2 p3"
          style="
            transform: matrix(
              0.70711,
              0.7071,
              -0.7071,
              0.70711,
              800.8462,
              570.7692
            );
          "
        >
          <use
            width="25px"
            height="25px"
            xlink:href="#triangle"
            class="aqua"
          ></use>
        </svg>
        <svg
          width="36px"
          height="36px"
          class="layer2 p7"
          style="transform: matrix(1, 0, 0, 1, -60.8462, 17.7692)"
        >
          <use xlink:href="#spring" class="pink"></use>
        </svg>
        <svg
          width="36px"
          height="36px"
          class="layer2 p7"
          style="transform: matrix(-1, 0, 0, 1, 800.8462, 400)"
        >
          <use xlink:href="#spring" class="pink"></use>
        </svg>
      </div>

      <!-- Navigation bar -->
      <div class="navbar scrolled">
        <div class="skills"></div>
        <div class="links">
          <div class="skill-icons">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              fill="yellow"
              class="bi bi-javascript"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M14 0a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zM9.053 7.596v3.127l-.007 1.752q0 .498-.186.752t-.556.263q-.342 0-.528-.234-.185-.234-.185-.684v-.175H6.37v.185q0 .665.253 1.113.255.45.703.674.44.225 1.016.225.88 0 1.406-.498.527-.498.527-1.485l.007-1.752V7.596zm3.808-.108q-.585 0-1.006.244a1.67 1.67 0 0 0-.634.674 2.1 2.1 0 0 0-.225.996q0 .753.293 1.182.303.42.967.732l.469.215q.438.186.625.43.185.244.185.635 0 .478-.166.703-.156.224-.527.224-.361.001-.547-.244-.186-.243-.205-.752h-1.162q.02.996.498 1.524.479.527 1.386.527.909 0 1.417-.518.507-.517.507-1.484 0-.81-.332-1.289t-1.045-.79l-.449-.196q-.39-.166-.556-.381-.166-.214-.166-.576 0-.4.165-.596.177-.195.508-.195.361 0 .508.234.156.234.176.703h1.123q-.03-.976-.498-1.484-.47-.518-1.309-.518"
              />
            </svg>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="30"
              height="30"
              fill="#3178C6"
              class="bi bi-typescript"
              viewBox="0 0 16 16"
            >
              <path
                fill-rule="evenodd"
                d="M14 0a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V2a2 2 0 0 1 2-2zm-1.139 7.488q-.585 0-1.006.244a1.67 1.67 0 0 0-.634.674 2.1 2.1 0 0 0-.225.996q0 .753.293 1.182.303.42.967.732l.469.215q.438.186.625.43.185.244.185.635 0 .478-.166.703-.156.224-.527.224-.361.001-.547-.244-.186-.243-.205-.752h-1.162q.02.996.498 1.524.479.527 1.386.527.909 0 1.417-.518.507-.517.507-1.484 0-.81-.332-1.289t-1.045-.79l-.449-.196q-.39-.166-.556-.381-.166-.214-.166-.576 0-.4.165-.596.177-.195.508-.195.361 0 .508.234.156.234.176.703h1.123q-.03-.976-.498-1.484-.47-.518-1.309-.518M7 7.596v1.113h1.3V14.5h1.221V8.709h1.289V7.596z"
              />
            </svg>
          </div>
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="contact.html">Contact</a>
        </div>
      </div>

      <!-- Contact content -->
      <div class="page-content">
        <h1>Get in Touch</h1>
        <h2>Let's build things together</h2>

        <div class="contact-container">
          <form class="contact-form">
            <div class="form-group">
              <input type="text" name="name" placeholder="Your Name" required />
            </div>
            <div class="form-group">
              <input
                type="email"
                name="email"
                placeholder="Your Email"
                required
              />
            </div>
            <div class="form-group">
              <input type="text" name="subject" placeholder="Subject" />
            </div>
            <div class="form-group">
              <textarea
                name="message"
                placeholder="Your Message"
                required
              ></textarea>
            </div>
            <button class="submit-btn">Send Message</button>
          </form>

          <div class="contact-links">
            <a
              href="https://github.com/"
              class="contact-link-item"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"
                ></path>
              </svg>
              <span>GitHub</span>
            </a>
            <a
              href="https://linkedin.com/"
              class="contact-link-item"
              target="_blank"
              rel="noopener noreferrer"
            >
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"
                ></path>
                <rect x="2" y="9" width="4" height="12"></rect>
                <circle cx="4" cy="4" r="2"></circle>
              </svg>
              <span>LinkedIn</span>
            </a>
            <a href="mailto:hello@example.com" class="contact-link-item">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="2" y="4" width="20" height="16" rx="2"></rect>
                <path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"></path>
              </svg>
              <span>Email</span>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="submit-success-window">
      <p>Message sent successfully!</p>
      <button class="close-btn">Close</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/animejs@4.3.6/dist/bundles/anime.umd.min.js"></script>
    <script src="/js/animate-background-icon.js"></script>
    <script src="/js/script.js"></script>
    <script src="/js/email-send-successful.js"></script>
  </body>
</html>
